# Sync upstream OrcaSlicer into HydraSlicer on every push to main + daily.
#
# Strategy:
#   1. Fetch latest upstream OrcaSlicer main branch
#   2. Attempt to merge upstream into a sync branch
#   3. If clean → push sync branch, open PR to main
#   4. If conflicts → push partial branch, open PR with conflict details
#
# The PR is always created so a human can review/resolve.
# This never force-pushes or modifies main directly.

name: Upstream Sync

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'Upstream ref to sync (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write
  actions: write
  
env:
  UPSTREAM_REPO: https://github.com/SoftFever/OrcaSlicer.git
  SYNC_BRANCH_PREFIX: sync/upstream

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout HydraSlicer
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for existing open sync PR
        id: existing
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${process.env.SYNC_BRANCH_PREFIX}`,
            });
            // Also search with broader prefix match
            const { data: allPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            const syncPrs = allPrs.filter(pr => pr.head.ref.startsWith('sync/upstream'));
            if (syncPrs.length > 0) {
              console.log(`Found ${syncPrs.length} open sync PR(s): ${syncPrs.map(p => '#' + p.number).join(', ')}`);
              console.log('Skipping to avoid duplicates. Merge or close existing PRs first.');
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Add upstream remote and fetch
        if: steps.existing.outputs.skip != 'true'
        run: |
          git remote add upstream "${{ env.UPSTREAM_REPO }}" || true
          git fetch upstream ${{ inputs.upstream_ref || 'main' }} --no-tags

      - name: Determine sync branch name
        if: steps.existing.outputs.skip != 'true'
        id: branch
        run: |
          DATE=$(date +%Y-%m-%d)
          UPSTREAM_SHA=$(git rev-parse --short upstream/${{ inputs.upstream_ref || 'main' }})
          BRANCH="${{ env.SYNC_BRANCH_PREFIX }}-${DATE}-${UPSTREAM_SHA}"
          echo "name=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "upstream_full_sha=$(git rev-parse upstream/${{ inputs.upstream_ref || 'main' }})" >> "$GITHUB_OUTPUT"

      - name: Create sync branch and attempt merge
        if: steps.existing.outputs.skip != 'true'
        id: merge
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          git checkout -b "${BRANCH}" origin/main

          # Record pre-merge state so we can restore protected files later
          PRE_MERGE_SHA=$(git rev-parse HEAD)
          echo "pre_merge_sha=${PRE_MERGE_SHA}" >> "$GITHUB_OUTPUT"

          # Attempt the merge
          if git merge "upstream/${{ inputs.upstream_ref || 'main' }}" \
               --no-edit \
               -m "Merge upstream OrcaSlicer ${{ steps.branch.outputs.upstream_sha }} into HydraSlicer"; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
            echo "✅ Merge completed cleanly"
          else
            echo "status=conflicts" >> "$GITHUB_OUTPUT"

            # Collect conflict details
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "conflicted_files<<EOF" >> "$GITHUB_OUTPUT"
            echo "${CONFLICTS}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

            CONFLICT_COUNT=$(echo "${CONFLICTS}" | wc -l)
            echo "conflict_count=${CONFLICT_COUNT}" >> "$GITHUB_OUTPUT"

            # Show conflict markers for the PR body
            CONFLICT_DETAILS=""
            for file in ${CONFLICTS}; do
              MARKERS=$(grep -c "^<<<<<<< " "${file}" 2>/dev/null || echo "0")
              CONFLICT_DETAILS="${CONFLICT_DETAILS}\n- \`${file}\` (${MARKERS} conflict regions)"
            done
            echo "conflict_details<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "${CONFLICT_DETAILS}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

            echo "⚠️ Merge has ${CONFLICT_COUNT} conflicted files"
          fi

      - name: Restore protected HydraSlicer files
        if: steps.existing.outputs.skip != 'true'
        id: protect
        run: |
          PRE_MERGE_SHA="${{ steps.merge.outputs.pre_merge_sha }}"

          # Protected paths: HydraSlicer-specific files and directories that must
          # never be overwritten by upstream OrcaSlicer changes.
          # Directories MUST end with a trailing slash.
          PROTECTED_PATHS=(
            "README.md"
            "CLAUDE.md"
            "AGENTS.md"
            "README.hydra.md"
            "task.md"
            ".github/workflows/"
            ".github/dependabot.yml"
            ".github/FUNDING.yml"
            ".github/pull_request_template.md"
            ".devcontainer/"
          )

          RESTORED_FILES=()
          RESTORE_COUNT=0

          for path in "${PROTECTED_PATHS[@]}"; do
            # Check if any files exist under this path at the pre-merge SHA
            FILES_AT_SHA=$(git ls-tree -r --name-only "${PRE_MERGE_SHA}" -- "${path}" 2>/dev/null)
            if [ -z "${FILES_AT_SHA}" ]; then
              echo "⏭️  Skipping ${path} (not present in HydraSlicer branch)"
              continue
            fi

            if [[ "${path}" == */ ]]; then
              # Directory: remove everything (including upstream additions), then restore ours
              echo "🔒 Restoring directory: ${path}"
              git rm -rf --quiet "${path}" 2>/dev/null || true
              rm -rf "${path}" 2>/dev/null || true
              git checkout "${PRE_MERGE_SHA}" -- "${path}"
            else
              # Single file: restore our version
              echo "🔒 Restoring file: ${path}"
              git checkout "${PRE_MERGE_SHA}" -- "${path}"
            fi

            while IFS= read -r f; do
              RESTORED_FILES+=("${f}")
              RESTORE_COUNT=$((RESTORE_COUNT + 1))
            done <<< "${FILES_AT_SHA}"
          done

          echo "restore_count=${RESTORE_COUNT}" >> "$GITHUB_OUTPUT"

          # Build list for PR body
          RESTORE_LIST=""
          for f in "${RESTORED_FILES[@]}"; do
            RESTORE_LIST="${RESTORE_LIST}- \`${f}\`\n"
          done
          echo "restore_list<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "${RESTORE_LIST}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "✅ Restored ${RESTORE_COUNT} protected file(s)"

      - name: Finalize merge commit
        if: steps.existing.outputs.skip != 'true'
        run: |
          git add -A

          if [ "${{ steps.merge.outputs.status }}" = "clean" ]; then
            # Amend the clean merge commit to include protected file restorations
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
              echo "📝 Amended merge commit with protected file restorations"
            else
              echo "ℹ️  No protected files needed restoration"
            fi
          else
            # Conflict case: create the WIP commit (with conflicts + restored protected files)
            git commit --no-verify -m "WIP: Merge upstream OrcaSlicer ${{ steps.branch.outputs.upstream_sha }} (has conflicts)

          This merge has conflicts that need manual resolution.
          Protected HydraSlicer files have been restored to pre-merge state.

          Conflicted files:
          ${{ steps.merge.outputs.conflicted_files }}"

            echo "📝 Created WIP commit with conflicts and restored protected files"
          fi

      - name: Push sync branch
        if: steps.existing.outputs.skip != 'true'
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          git push -u origin "${BRANCH}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR (clean merge)
        if: steps.existing.outputs.skip != 'true' && steps.merge.outputs.status == 'clean'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⬆️ Upstream sync: OrcaSlicer ${process.env.UPSTREAM_SHA}`,
              head: process.env.BRANCH,
              base: 'main',
              body: [
                '## Upstream Sync',
                '',
                `Merges latest OrcaSlicer [\`${process.env.UPSTREAM_SHA}\`](https://github.com/SoftFever/OrcaSlicer/commit/${process.env.UPSTREAM_FULL_SHA}) into HydraSlicer.`,
                '',
                '**Status:** ✅ Clean merge — no conflicts.',
                '',
                '### Review checklist',
                '- [ ] Skim changed files for anything that could break Hydra features',
                '- [ ] Check if any modified files overlap with `#ifdef SLIC3R_ENABLE_HYDRA` blocks',
                '- [ ] Merge when ready',
                '',
                ...(parseInt(process.env.RESTORE_COUNT) > 0 ? [
                  `### Protected files (${process.env.RESTORE_COUNT} files preserved)`,
                  'The following HydraSlicer-specific files were excluded from the upstream merge:',
                  process.env.RESTORE_LIST,
                ] : []),
                '*Auto-generated by the upstream-sync workflow.*',
              ].join('\n'),
            });
            console.log(`Created PR #${pr.number}: ${pr.html_url}`);
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          UPSTREAM_SHA: ${{ steps.branch.outputs.upstream_sha }}
          UPSTREAM_FULL_SHA: ${{ steps.branch.outputs.upstream_full_sha }}
          RESTORE_COUNT: ${{ steps.protect.outputs.restore_count }}
          RESTORE_LIST: ${{ steps.protect.outputs.restore_list }}

      - name: Create PR (conflicts)
        if: steps.existing.outputs.skip != 'true' && steps.merge.outputs.status == 'conflicts'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Upstream sync: OrcaSlicer ${process.env.UPSTREAM_SHA} (conflicts)`,
              head: process.env.BRANCH,
              base: 'main',
              draft: true,
              body: [
                '## Upstream Sync — Manual Resolution Needed',
                '',
                `Attempted to merge OrcaSlicer [\`${process.env.UPSTREAM_SHA}\`](https://github.com/SoftFever/OrcaSlicer/commit/${process.env.UPSTREAM_FULL_SHA}) into HydraSlicer.`,
                '',
                `**Status:** ⚠️ ${process.env.CONFLICT_COUNT} files have merge conflicts.`,
                '',
                '### Conflicted files',
                process.env.CONFLICT_DETAILS,
                '',
                '### How to resolve',
                '```bash',
                `git fetch origin ${process.env.BRANCH}`,
                `git checkout ${process.env.BRANCH}`,
                '',
                '# Fix conflicts in each file, then:',
                'git add <resolved-file>',
                'git commit',
                'git push',
                '```',
                '',
                '### Tips',
                '- Conflicts in `Plater.cpp` or `MainFrame.cpp` are common — look for `#ifdef SLIC3R_ENABLE_HYDRA` blocks',
                '- If upstream restructured a function that Hydra modifies, re-apply the Hydra changes inside the new structure',
                '- Run a build after resolving to verify: `cmake --build build/ --config RelWithDebInfo`',
                '',
                ...(parseInt(process.env.RESTORE_COUNT) > 0 ? [
                  `### Protected files (${process.env.RESTORE_COUNT} files preserved)`,
                  'The following HydraSlicer-specific files were excluded from the upstream merge:',
                  process.env.RESTORE_LIST,
                ] : []),
                '*Auto-generated by the upstream-sync workflow.*',
              ].join('\n'),
            });

            // Add labels if they exist
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['upstream-sync', 'needs-resolution'],
              });
            } catch (e) {
              console.log('Could not add labels (they may not exist yet):', e.message);
            }

            console.log(`Created draft PR #${pr.number}: ${pr.html_url}`);
        env:
          BRANCH: ${{ steps.branch.outputs.name }}
          UPSTREAM_SHA: ${{ steps.branch.outputs.upstream_sha }}
          UPSTREAM_FULL_SHA: ${{ steps.branch.outputs.upstream_full_sha }}
          CONFLICT_COUNT: ${{ steps.merge.outputs.conflict_count }}
          CONFLICT_DETAILS: ${{ steps.merge.outputs.conflict_details }}
          RESTORE_COUNT: ${{ steps.protect.outputs.restore_count }}
          RESTORE_LIST: ${{ steps.protect.outputs.restore_list }}
